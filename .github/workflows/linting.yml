---
name: Linting

on:
  pull_request:
  push:
    branches: [main]

jobs:
  pre-commit:
    runs-on: ubuntu-latest

    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6
      - uses: prefix-dev/setup-pixi@v0.9.4
        with:
          pixi-version: "v0.67.1"

      - name: List env contents
        run: |
          pixi list

      - name: Run tests
        run: |
          pixi run pre-commit run --show-diff-on-failure --color=always --all-files
