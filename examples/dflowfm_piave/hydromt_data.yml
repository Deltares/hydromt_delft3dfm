meta:
  root: None

grip_roads:
  uri: grip_roads.gpkg
  driver:
    name: pyogrio
  version: v4
  metadata:
    crs: 4326
    category: road
    paper_doi: 10.1088/1748-9326/aabd42
    paper_ref: Meijer et al, 2018
    url: https://www.globio.info/download-grip-dataset
    license: CC0-1.0
  data_type: GeoDataFrame
  root: None

hydro_rivers_lin:
  uri: rivers_lin2019_v1.gpkg
  driver:
    name: pyogrio
  version: '1'
  metadata:
    category: hydrography
    paper_doi: 10.5281/zenodo.3552776
    paper_ref: Lin et al. (2019)
    processing_notes: hydrography/rivers_lin2019/README
    url: https://zenodo.org/record/3552776#.YVbOrppByUk
    license: CC-BY-NC 4.0
  data_type: GeoDataFrame
  root: None

manholes_defaults:
  uri: storages/manholes_defaults.csv
  driver:
    name: pandas
  metadata:
    notes: default manhole parameters.
  data_type: DataFrame
  root: None

merit_hydro:
  uri: merit_hydro/{variable}.tif
  driver:
    options: {}
    name: rasterio
  version: '1.0'
  metadata:
    crs: 4326
    category: topography
    paper_doi: 10.1029/2019WR024873
    paper_ref: Yamazaki et al. (2019)
    url: http://hydro.iis.u-tokyo.ac.jp/~yamadai/MERIT_Hydro
    license: CC-BY-NC 4.0 or ODbL 1.0
  data_type: RasterDataset
  root: None

pipes_defaults:
  uri: branches/pipes_defaults.csv
  driver:
    name: pandas
  metadata:
    notes: default pipe parameters.
  data_type: DataFrame
  root: None

rivers_defaults:
  uri: branches/rivers_defaults.csv
  driver:
    name: pandas
  metadata:
    notes: default river parameters.
  data_type: DataFrame
  root: None

vito_2015:
  uri: vito.tif
  driver:
    options: {}
    name: rasterio
  version: 2.0.2
  metadata:
    crs: 4326
    category: landuse & landcover
    paper_doi: 10.5281/zenodo.3939038
    paper_ref: Buchhorn et al (2020)
    url: https://land.copernicus.eu/global/products/lc
  data_type: RasterDataset
  root: None

vito_mapping:
  uri: landuse/vito_mapping.csv
  driver:
    options:
      index_col: 0
    name: pandas
  metadata:
    nodata:
      landuse: 0
      roughness_manning: -999.0
      infiltcap: -999.0
    category: landuse
    source_version: 1.0
    notes: landuse parameters based on vito classification (https://land.copernicus.eu/global/products/lc)
  data_type: DataFrame
  root: None
